<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #f5f11e2d;
            padding: 20px;
            display:flex:
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            background-color: #ffffff;
            border: 1px solid #ddd;
        }
        .header-com-fundo {
            background-image: url;
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            padding: 0px;
            margin-bottom: 24px;
        }
        header h1 {
            font-size: 44px;
            padding: 1px;
            border: 1px solid #000000;
        }
        nav {
            background-color: #ffffff;
            padding: 15px;
        }
        nav ul {
            list-style-type: disc;
            padding-left: 20px;
        }
        nav ul li a {
            color: #0000ee;
            text-decoration: underline;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class=".container"
        <header class="header-com-fundo">
        <img src="https://i.pinimg.com/originals/c2/1a/07/c21a07ed502021ad7bbb244e0f04c446.jpg" alt="Descrição da imagem para acessibilidade">
        <h1>SAiTAMA SOLOS GOKU</h1>
        </header>
    </div>
</body>
</html>
